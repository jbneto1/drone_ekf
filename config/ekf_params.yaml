# =============================================================================
# EKF configuration for drone pose relative to the landpad frame.
#
# Current active architecture:
# - Prediction: PX4 body-frame velocity + body angular rate
# - Updates: ArUco x/y + z + yaw, laser z, optional UWB x/y
# - State frame: drone pose expressed in the landpad frame
# =============================================================================

debug:
  log_innovations: true
  log_covariance: true
  log_prediction: true

# Loaded by ekf.launch before nodes start. Keep runtime launch choices here so
# normal replay/testing can be driven by editing this file only.
/use_sim_time: false
/controller_pose_topic: '/ekf/pose'

controller_frame_diagnostics:
  enabled: true
  rate_hz: 10.0
  yaw_target_rad: 1.57079632679
  csv_path: ''
  max_age_warn: 0.5
  topics:
    ekf_pose: '/ekf/pose'
    ekf_odom: '/ekf/odom'
    # Empty by default to avoid recording a duplicate /ekf/pose stream.
    # Set this to the controller's consumed pose topic when it differs.
    controller_pose: ''
    thermal_pose: '/thermal/pose'
    local_pose: '/mavros/local_position/pose'
    raw_controller_cmd: '/controller/raw_cmd_vel'
    mavros_cmd: '/mavros/setpoint_velocity/cmd_vel'

initialization:
  # Diagonal entries of the initial covariance matrix P.
  P_init:
    position: [0.05, 0.05, 0.10]       # m^2
    velocity: [0.50, 0.50, 0.25]       # (m/s)^2
    orientation: [0.05, 0.05, 0.05, 0.05]  # quaternion-component variance

  # Wait for the first ArUco pose before switching to TRACKING.
  wait_for_aruco: true

  # Used only when wait_for_aruco is false.
  default_position: [0.0, 0.0, 0.1]               # m, landpad frame
  default_orientation: [0.0, 0.0, -0.7071068, 0.7071068]  # quaternion [x,y,z,w]
  alternative_covariance_scale: 2.0

sensors:
  aruco:
    enabled: true
    position_update: true         # legacy parent switch for ArUco position updates
    xy_update: true               # x/y update, independently gated
    z_update: true                # z update, independently gated
    orientation_update: true      # yaw-only update
    max_age: 0.3                 # seconds; measured ArUco age is often 0.17-0.31 s
    markers:
      '417':
        topic: '/aruco/pose/marker_417'
        position_noise: [0.02, 0.02, 0.02]      # variance [m^2]
        orientation_noise_yaw: 0.02            # variance [rad^2]
      '363':
        topic: '/aruco/pose/marker_363'
        position_noise: [0.06, 0.06, 0.06]      # variance [m^2]
        orientation_noise_yaw: 0.06             # variance [rad^2]
      '682':
        topic: '/aruco/pose/marker_682'
        position_noise: [0.18, 0.18, 0.18]      # variance [m^2]
        orientation_noise_yaw: 0.18             # variance [rad^2]

  thermal:
    enabled: false
    topic: '/thermal/pose'
    position_update: true
    orientation_update: true      # yaw-only update
    allow_initialization: false
    max_age: 0.5                  # seconds

  laser:
    enabled: true
    topic: '/mavros/altitude'

  uwb:
    enabled: false
    topic: '/dwm1001/id_uwb_map/pose_kf'
    max_age: 0.5                  # seconds; reject stale UWB pose updates

  px4_velocity:
    enabled: true
    topic: '/mavros/local_position/velocity_body'
    use_z: false                  # z in the process model intentionally disabled

process_model:
  # This is PX4 velocity dead reckoning, not raw IMU mechanization.
  type: 'PX4_Velocity'
  Q:
    position: [10, 10, 10]           # variance [m^2 / s]
    velocity: [10, 10, 10]            # variance [(m/s)^2 / s]
    orientation: [10, 10, 10, 10]   # quaternion-component variance / s

covariance_limits:
  enabled: false
  # Prevent long vision dropouts from making one later marker sample dominate
  # the whole state. These are generous ceilings, not normal operating targets.
  min_diag: 1.0e-9
  max_diag:
    position: [1.0, 1.0, 0.5]          # m^2
    velocity: [1.0, 1.0, 0.5]          # (m/s)^2
    orientation: [0.02, 0.02, 0.02, 0.02]

output:
  # Use current ROS time for fused outputs so /ekf/odom and dead reckoning
  # remain monotonic even when delayed measurements trigger an update.
  # Set to 'measurement' to stamp outputs with the triggering sensor header.
  stamp_mode: 'current'

measurement_noise:
  aruco:
    # Fallback only. Configured markers use sensors.aruco.markers.* noise.
    position: [0.08, 0.08, 0.12]   # [m^2]
    yaw: 0.05                      # [rad^2]

  thermal:
    position: [0.16, 0.16, 0.25]   # [m^2]
    yaw: 0.09                      # [rad^2]

  laser:
    z: [0.005]                      # [m^2]

  uwb:
    xy: [0.2, 0.2]               # [m^2]

mahalanobis:
  aruco:
    # Master switch. Optional per-component overrides are xy_enabled,
    # z_enabled, and yaw_enabled if you want to gate only some components.
    enabled: true
    xy_threshold: 9.210           # chi^2, 2 DOF, 99%
    z_threshold: 6.635            # chi^2, 1 DOF, 99%
    yaw_threshold: 6.635          # chi^2, 1 DOF, 99%
  laser:
    enabled: false
    z_threshold: 10.828           # chi^2, 1 DOF, 99.9%
  uwb:
    enabled: false
    xy_threshold: 9.210           # chi^2, 2 DOF, 99%
  thermal:
    enabled: false
    position_threshold: 11.345
    yaw_threshold: 6.635

innovation_limits:
  aruco:
    enabled: false
    xy_norm: 1.0                  # m; reject impossible reacquisition jumps
    z_abs: 0.50                   # m
    yaw_abs: 0.60                 # rad, about 34 deg
  laser:
    enabled: false
    z_abs: 0.60                   # m

# Format: row-major 4x4 homogeneous matrix
# [R11,R12,R13,tx, R21,R22,R23,ty, R31,R32,R33,tz, 0,0,0,1]
transforms:
  # Transform from stereo camera frame to drone body frame.
  # Camera axes are project-specific; comments below describe the active matrix,
  # not a generic convention:
  #   drone_x = +camera_y
  #   drone_y = +camera_x
  #   drone_z = -camera_z
  T_cam_to_drone:
    matrix: [
      0.0, 1.0, 0.0, 0.153,
      1.0, 0.0, 0.0, -0.030,
      0.0, 0.0, -1.0, -0.100,
      0.0, 0.0, 0.0, 1.000
    ]

  T_thermal_to_drone:
    matrix: [
      0.0, 1.0, 0.0, 0.153,
      1.0, 0.0, 0.0, -0.030,
      0.0, 0.0, -1.0, -0.100,
      0.0, 0.0, 0.0, 1.000
    ]

  T_laser_to_drone:
    matrix: [
      1.0, 0.0, 0.0, 0.000,
      0.0, -1.0, 0.0, 0.000,
      0.0, 0.0, -1.0, -0.100,
      0.0, 0.0, 0.0, 1.000
    ]

  T_uwb_to_drone:
    matrix: [
      1.0, 0.0, 0.0, 0.035,
      0.0, 1.0, 0.0, 0.040,
      0.0, 0.0, 1.0, 0.000,
      0.0, 0.0, 0.0, 1.000
    ]

T_uwb_map_to_landpad:
  matrix: [
    1.0, 0.0, 0.0, -0.4475,
    0.0, 1.0, 0.0, -0.306,
    0.0, 0.0, 1.0, 0.000,
    0.0, 0.0, 0.0, 1.000
  ]

output_topics:
  ekf_pose: '/ekf/pose'
  ekf_odom: '/ekf/odom'
  dead_reckoning: '/ekf/dead_reckoning'

  aruco_marker_measurement_prefix: '/ekf/measurements/aruco/marker_'
  thermal_measurement: '/ekf/measurements/thermal'
  laser_measurement: '/ekf/measurements/laser'
  uwb_measurement: '/ekf/measurements/uwb'

  sensor_status: '/ekf/sensor_status'
  innovation_debug: '/ekf/debug/innovation'
  covariance_debug: '/ekf/debug/covariance'
  kalman_gain_debug: '/ekf/debug/kalman_gain'
  timing_debug: '/ekf/debug/timing'
  aruco_marker_quality: '/aruco/debug/marker_quality'

plotter:
  save_dir: '/tmp/ekf_plots'
  max_points: 6000
  max_plot_points: 1000
  max_event_points: 1000
  dpi: 300
  tight_bbox: true
  nis:
    ylim: [0, 15]
    sqrt_ylim: [0, 4]
  covariance:
    mode: 'std'                   # std or variance
    yscale: 'log'                 # log or linear
  yaw:
    show_dead_reckoning: false
    ylim: [-200, 200]
    unwrap: false
