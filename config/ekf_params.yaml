# =============================================================================
# EKF Configuration for Drone Landing System
# =============================================================================
# This file is loaded at runtime - no catkin_make required after changes
# =============================================================================

# -----------------------------------------------------------------------------
# DEBUG CONFIGURATION
# -----------------------------------------------------------------------------
debug:
  log_transforms: true       # Log transform validations at startup
  log_innovations: true     # Log measurement innovations
  log_covariance: true       # Log covariance diagonal every 2s
  log_prediction: true     # Log velocity and dt in predict step
  log_measurements: true     # Log raw sensor measurements

# -----------------------------------------------------------------------------
# EKF INITIALIZATION
# -----------------------------------------------------------------------------
initialization:
  # Initial state covariance (diagonal values)
  P_init:
    position: [100.0, 100.0, 100.0]
    velocity: [100.0, 100.0, 100.0]
    orientation: [100.0, 100.0, 100.0, 100.0]
    
  # Wait for first ArUco detection before starting filter
  # Set to false for testing without ArUco
  wait_for_aruco: true  #
  
  # Default initialization position (used if wait_for_aruco is false)
  default_position: [0.0, 0.0, 0.1]  # x, y, z in landpad frame
  default_orientation: [0.0, 0.0, -0.7071068, 0.7071068]  # qx, qy, qz, qw
  alternative_covariance_scale: 2.0  # Higher uncertainty than ArUco init

# -----------------------------------------------------------------------------
# SENSOR ENABLE/DISABLE TOGGLES
# -----------------------------------------------------------------------------
sensors:
  aruco:
    enabled: true
    position_update: true
    orientation_update: true
    # Per-marker configuration (EKF subscribes to each individually)
    markers:
      417:   # 25cm - largest, most reliable
        topic: '/aruco/pose/marker_417'
        position_noise: [0.10, 0.10, 0.15]
        orientation_noise_rvec: [0.10, 0.10, 0.10]
      363:   # 15cm - medium
        topic: '/aruco/pose/marker_363'
        position_noise: [0.10, 0.10, 0.15]
        orientation_noise_rvec: [0.10, 0.10, 0.10]
      682:   # 8cm - smallest, least reliable
        topic: '/aruco/pose/marker_682'
        position_noise: [0.10, 0.10, 0.15]
        orientation_noise_rvec: [0.10, 0.10, 0.10]
    
  laser:
    enabled: true          # ✅ Laser provides Z measurement updates
    topic: '/mavros/altitude'
    field: 'bottom_clearance'  # Which field to use from Altitude message
    
  uwb:
    enabled: true            # ✅ UWB provides X,Y measurement updates
    topic: '/dwm1001/id_uwb_map/pose_kf'
    
  optical_flow:
    enabled: false             # ❌ DISABLED: Not reliable for this use case
    flow_topic: '/mavros/px4flow/raw/optical_flow_rad'
    range_topic: '/mavros/px4flow/ground_distance'
    min_quality: 100
    
  px4_velocity:
    enabled: true              # ✅ ENABLED: Use PX4 velocity for process model
    topic: '/mavros/local_position/velocity_body' # Body-frame velocity for prediction step
    use_z: false

# -----------------------------------------------------------------------------
# ARUCO DETECTION QUALITY GATE (in stereo_aruco_detector_node)
# -----------------------------------------------------------------------------
# Minimum pixel span for reliable PnP. Markers appearing smaller than this
# in the image are rejected before pose estimation. Set via Config::minPixelSpan.
# Current: 60 pixels
# Formula: max_range = marker_size * focal_length / min_pixel_span
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# PROCESS MODEL CONFIGURATION
# -----------------------------------------------------------------------------
process_model:
  # Use PX4's fused velocity estimate (includes IMU + barometer + flow fusion)
  type: 'PX4_Velocity'
  
  # Process noise covariance Q (diagonal values)
  # State: [x, y, z, vx, vy, vz, qx, qy, qz, qw]
  Q:
    position: [0.01, 0.01, 0.5]     # Z very high: model gives nothing useful
    velocity: [0.1, 0.1, 0.5]       # Z velocity also unreliable
    orientation: [0.01, 0.01, 0.1, 0.1] 

# -----------------------------------------------------------------------------
# MEASUREMENT NOISE COVARIANCES (R matrices)
# -----------------------------------------------------------------------------
measurement_noise:
  aruco:
    position: [0.3, 0.3, 0.5]           # x, y, z measurement noise (reduced trust due to noise)
    orientation_rvec: [0.2, 0.2, 0.2]   # quaternion measurement noise
    
  laser:
    z: [0.05]                            # z-only measurement noise (very accurate)
    
  uwb:
    xy: [0.2, 0.2]                     # x, y measurement noise (trust UWB more)
    
  optical_flow:
    velocity_xy: [0.1, 0.1]              # Not used (optical flow disabled)

# -----------------------------------------------------------------------------
# MAHALANOBIS GATE THRESHOLDS (chi-squared values)
# -----------------------------------------------------------------------------
# Measurements with Mahalanobis distance² exceeding these thresholds are rejected.
# Values come from chi-squared distribution at chosen confidence level.
#
# DOF  |  95%    99%     99.9%
# -----+------------------------
#  1   |  3.841   6.635  10.828    (laser: z only)
#  2   |  5.991   9.210  13.816    (UWB: x,y)
#  3   |  7.815  11.345  16.266    (ArUco: x,y,z or roll,pitch,yaw)
#
mahalanobis_gates:
  aruco_position: -1       # 3 DOF, 95% confidence
  aruco_orientation: -1    # 3 DOF, 95% confidence
  laser: -1                 # DISABLE (-1 = no gate)
  uwb: -1                   # 

# -----------------------------------------------------------------------------
# STATIC TRANSFORMS (4x4 Homogeneous Transformation Matrices)
# -----------------------------------------------------------------------------
# Format: Row-major 4x4 matrix [R11,R12,R13,tx, R21,R22,R23,ty, R31,R32,R33,tz, 0,0,0,1]
# These transform FROM sensor frame TO drone body frame: T_drone_sensor
# -----------------------------------------------------------------------------

transforms:
  # Camera to Drone transform (CORRECTED: X sign flipped)
  # Camera: X-right, Y-down, Z-forward (pointing down)
  # Drone: X-forward, Y-left, Z-up
  T_cam_to_drone:
    matrix: [
       0.0, 1.0,  0.0,  0.153,   #  drone_x = -cam_y
       1.0,  0.0,  0.0, -0.030,   # ✓ drone_y = cam_x
       0.0,  0.0, -1.0, -0.100,   # ✓ drone_z = -cam_z
       0.0,  0.0,  0.0,  1.000
    ]
    
  # Laser altimeter to Drone transform
  T_laser_to_drone:
    matrix: [
       1.0,  0.0,  0.0,  0.000,   
       0.0,  -1.0,  0.0,  0.000,
       0.0,  0.0, -1.0, -0.100,   # Mounted 10cm below drone origin
       0.0,  0.0,  0.0,  1.000
    ]
    
  # UWB tag to Drone transform
  T_uwb_to_drone:
    matrix: [
       1.0,  0.0,  0.0,  0.035,
       0.0,  1.0,  0.0,  0.040,
       0.0,  0.0,  1.0,  0.000,
       0.0,  0.0,  0.0,  1.000
    ]
    
  # Optical Flow sensor to Drone transform (not used, but kept for completeness)
  T_flow_to_drone:
    matrix: [
       1.0,  0.0,  0.0,  0.080,
       0.0,  1.0,  0.0,  0.000,
       0.0,  0.0,  1.0, -0.110,
       0.0,  0.0,  0.0,  1.000
    ]

# -----------------------------------------------------------------------------
# UWB TO LANDPAD FRAME TRANSFORM
# -----------------------------------------------------------------------------
# This transforms UWB map frame to landpad frame
# Must be calibrated based on UWB anchor positions relative to landing pad
T_uwb_map_to_landpad:
  matrix: [
     1.0,  0.0,  0.0,  -0.4475,
     0.0,  1.0,  0.0,  -0.306,
     0.0,  0.0,  1.0,  0.000,
     0.0,  0.0,  0.0,  1.000
  ]


# -----------------------------------------------------------------------------
# PUBLISHED TOPICS (for plotter consumption)
# -----------------------------------------------------------------------------
output_topics:
  ekf_pose: '/ekf/pose'
  ekf_odom: '/ekf/odom'
  dead_reckoning: '/ekf/dead_reckoning'
  
  # Per-sensor measurement topics (transformed to landpad frame)
  aruco_measurement: '/ekf/measurements/aruco'
  laser_measurement: '/ekf/measurements/laser'
  uwb_measurement: '/ekf/measurements/uwb'
  
  # Sensor status topic
  sensor_status: '/ekf/sensor_status'

# -----------------------------------------------------------------------------
# PLOTTER CONFIGURATION
# -----------------------------------------------------------------------------
plotter:
  save_dir: '/tmp/ekf_plots'
  save_on_shutdown: true
  max_points: 10000
  yaw:
    show_dead_reckoning: false  
    ylim: [-200, 200]            
    unwrap: false             

